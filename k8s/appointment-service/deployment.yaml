apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: distributed-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: amzalfoumi/appointment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: appointment-service-secret
            - configMapRef:
                name: appointment-service-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
