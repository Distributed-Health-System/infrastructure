apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: distributed-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3004
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secret
                  key: MONGODB_URI
          envFrom:
            - configMapRef:
                name: appointment-service-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
