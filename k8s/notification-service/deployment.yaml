apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: distributed-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: amzalfoumi/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3007
          envFrom:
            - secretRef:
                name: notification-service-secret
                optional: true
            - configMapRef:
                name: notification-service-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
