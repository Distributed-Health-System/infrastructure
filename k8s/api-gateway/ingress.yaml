apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: distributed-health
  annotations:
    # Internet-facing Application Load Balancer provisioned by the AWS Load Balancer Controller
    alb.ingress.kubernetes.io/scheme: internet-facing
    # Route directly to pod IPs (required pattern for EKS with the LBC)
    alb.ingress.kubernetes.io/target-type: ip
    # HTTP only for the demo; add an HTTPS listener + certificate-arn for production
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # NOTE: ALB has no CORS feature. CORS is handled inside the api-gateway app,
    # not at the ingress (the previous nginx cors-* annotations did this and do
    # nothing on ALB). Ensure the gateway sets CORS headers itself.
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # A single route: Catch ALL traffic and send it to the API Gateway
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway # Must match the exact name in api-gateway/service.yaml
                port:
                  number: 3001 # Must match the port defined in api-gateway/service.yaml
